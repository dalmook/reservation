<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>점핑배틀 운영센터</title><link rel="stylesheet" href="./style.css"/></head><body>
<div class="app"><aside><div class="brand"><div class="logo">JB</div><div><h1 id="shopName">점핑배틀</h1><p>예약 · 정산 · 분석</p></div></div><nav><button class="nav active" data-page="dashboard">실시간 현황</button><button class="nav" data-page="reservations">예약 관리</button><button class="nav" data-page="slots">슬롯/방 설정</button><button class="nav" data-page="settlement">결제·정산</button><button class="nav" data-page="analytics">분석</button><button class="nav" data-page="settings">설정</button></nav><div class="status"><span id="apiState" class="pill warn">API 미연결</span><button id="btnLogout">로그아웃</button></div></aside>
<main><header><div><h2 id="pageTitle">실시간 현황</h2><p id="clock">-</p></div><div class="actions"><input id="workDate" type="date"/><button id="btnRefresh">새로고침</button><button id="btnQuickReservation" class="primary">예약 추가</button></div></header>
<section id="loginPanel" class="login"><div class="login-card"><h2>운영센터 로그인</h2><p>NAS API 주소와 관리자 PIN을 입력하세요.</p><label>API 주소<input id="apiBaseInput" placeholder="http://NAS주소:8787"/></label><label>관리자 PIN<input id="pinInput" type="password"/></label><button id="btnLogin" class="primary">로그인</button></div></section>
<section id="content" class="hidden">
<section class="page active" id="page-dashboard"><div id="metricGrid" class="metrics"></div><div class="panel"><div class="panel-title"><h3>시간대별 방 현황</h3><span>현재 기준 다음 슬롯은 파란색</span></div><div id="slotBoard" class="slot-board"></div></div><div class="panel"><div class="panel-title"><h3>다가오는 예약</h3><span id="upcomingCount"></span></div><div id="upcomingList" class="cards"></div></div></section>
<section class="page" id="page-reservations"><div class="panel"><div class="panel-title"><h3>예약 목록</h3><div class="inline"><input id="searchReservation" placeholder="팀명/전화/티켓 검색"/><button id="btnNewReservation" class="primary">예약 추가</button></div></div><div id="reservationTable" class="table"></div></div></section>
<section class="page" id="page-slots"><div class="grid2"><div class="panel"><h3>슬롯 추가/막기/열기</h3><div class="formgrid"><label>일자<input id="slotDate" type="date"/></label><label>시간<input id="slotTime" type="time" step="1200"/></label><label>방<select id="slotRoom"></select></label><label>상태<select id="slotStatus"><option value="OPEN">열기</option><option value="BLOCKED">막기</option></select></label><label class="wide">메모<input id="slotMemo"/></label></div><button id="btnSaveSlot" class="primary">슬롯 저장</button></div><div class="panel"><h3>방 추가/수정</h3><div class="formgrid"><label>방 ID<input id="roomId" placeholder="D1"/></label><label>방 이름<input id="roomName" placeholder="특대형방 D1"/></label><label>정원<input id="roomCapacity" type="number" value="6"/></label><label>정렬<input id="roomSort" type="number" value="10"/></label></div><button id="btnSaveRoom" class="primary">방 저장</button></div></div><div class="panel"><h3>오늘 슬롯 목록</h3><div id="slotList" class="table"></div></div></section>
<section class="page" id="page-settlement"><div class="panel"><div class="panel-title"><h3>미정산/결제 현황</h3><button id="btnExportCsv">CSV 내보내기</button></div><div id="settlementList" class="cards"></div></div></section>
<section class="page" id="page-analytics"><div id="analysisMetrics" class="metrics"></div><div class="grid2"><div class="panel"><h3>시간대별 매출</h3><canvas id="chartTime"></canvas></div><div class="panel"><h3>방별 팀수</h3><canvas id="chartRoom"></canvas></div><div class="panel"><h3>난이도</h3><canvas id="chartDifficulty"></canvas></div><div class="panel"><h3>결제수단</h3><canvas id="chartPayment"></canvas></div></div></section>
<section class="page" id="page-settings"><div class="grid2"><div class="panel"><h3>운영 설정</h3><div class="formgrid"><label>시작<input id="settingStart" type="time"/></label><label>종료<input id="settingEnd" type="time"/></label><label>간격<input id="settingInterval" type="number"/></label><label>매장명<input id="settingShopName"/></label></div><button id="btnSaveSettings" class="primary">설정 저장</button></div><div class="panel danger-panel"><h3>일자 초기화</h3><p>백업 후 선택 날짜 데이터를 초기화합니다.</p><button id="btnResetDay" class="danger">선택 일자 초기화</button></div></div><div class="panel"><h3>상품/가격</h3><div id="productList" class="table"></div></div></section>
</section></main></div>
<dialog id="reservationDialog"><form method="dialog" id="reservationForm" class="dialog"><div class="dialog-head"><h3 id="reservationDialogTitle">예약 추가</h3><button value="cancel">×</button></div><input id="resId" type="hidden"/><div class="formgrid"><label>날짜<input id="resDate" type="date" required/></label><label>시간<input id="resTime" type="time" step="1200" required/></label><label>방<select id="resRoom"></select></label><label>난이도<select id="resDifficulty"></select></label><label class="wide">팀명<input id="resTeam" required/></label><label>성인<input id="resAdult" type="number" min="0" value="1"/></label><label>청소년<input id="resYouth" type="number" min="0" value="0"/></label><label>전화<input id="resPhone"/></label><label>할인<input id="resDiscount" type="number" min="0" value="0"/></label><label class="wide">메모<input id="resMemo"/></label></div><div class="dialog-actions"><button value="cancel">닫기</button><button id="btnSaveReservation" class="primary">저장</button></div></form></dialog>
<dialog id="paymentDialog"><form method="dialog" id="paymentForm" class="dialog"><div class="dialog-head"><h3>결제/상품 추가</h3><button value="cancel">×</button></div><input id="payResId" type="hidden"/><div class="formgrid"><label>결제수단<select id="payMethod"><option>카드</option><option>현금</option><option>계좌</option><option>데이트팝</option><option>쿠폰</option></select></label><label>금액<input id="payAmount" type="number"/></label><label class="wide">메모<input id="payMemo"/></label><label>상품<select id="itemProduct"></select></label><label>수량<input id="itemQty" type="number" value="1"/></label></div><div class="dialog-actions"><button id="btnAddItem">상품 추가</button><button id="btnAddPayment" class="primary">결제 추가</button></div></form></dialog>
<div id="toast"></div><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script type="module" src="./app.js"></script></body></html>
